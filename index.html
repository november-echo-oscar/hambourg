
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hambourg Explorer - Le Grand Tour</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        #map { height: 100%; width: 100%; z-index: 1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .custom-pin {
            width: 32px; height: 32px; background: #2563eb; border: 3px solid white;
            border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 800; font-size: 12px; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
        }
        .custom-pin div { transform: rotate(45deg); }
        
        .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
<link rel="manifest" href="manifest.json">

</head>
<body class="bg-slate-50 overflow-hidden text-slate-900">

    <div class="flex flex-col h-screen">
        <!-- Header -->
        <header class="bg-white border-b px-6 py-4 flex items-center justify-between z-30 shadow-sm shrink-0">
            <div class="flex items-center gap-4">
                <div class="bg-blue-600 p-2.5 rounded-2xl text-white shadow-lg shadow-blue-100">
                    <i data-lucide="anchor"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black tracking-tight text-blue-900 uppercase italic">Hamburg Explorer</h1>
                    <p id="mode-indicator" class="text-[10px] font-bold text-blue-500 uppercase tracking-widest mt-0.5">Mode Visionnage</p>
                </div>
            </div>
            
            <div class="flex items-center gap-2">
                <button id="toggle-edit-btn" onclick="toggleAppMode()" class="bg-slate-900 text-white px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-blue-600 transition-all flex items-center gap-2">
                    <i data-lucide="settings-2" class="w-4 h-4"></i> 
                    <span id="btn-text">Gérer l'itinéraire</span>
                </button>
            </div>
        </header>

        <div class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
            <!-- Sidebar -->
            <aside id="sidebar" class="sidebar w-full md:w-[420px] bg-white border-r flex flex-col z-20 shadow-xl shrink-0">
                <div class="p-5 border-b bg-slate-50 flex items-center justify-between">
                    <span class="flex items-center gap-2 font-black text-slate-500 text-[10px] uppercase tracking-widest">
                        <i data-lucide="map-pin" class="w-4 h-4 text-blue-600"></i> Circuit Expert & Bunker
                    </span>
                    <span id="step-count" class="text-[10px] font-bold text-slate-400 bg-white px-2 py-1 rounded-lg border border-slate-200"></span>
                </div>
                
                <div class="flex-1 overflow-y-auto p-4 space-y-3 no-scrollbar" id="itinerary-list">
                </div>

                <div id="add-step-container" class="hidden p-4 border-t bg-white">
                    <button onclick="createNewStep()" class="w-full bg-blue-50 text-blue-600 border-2 border-dashed border-blue-200 py-3 rounded-2xl font-black text-[11px] uppercase tracking-widest hover:bg-blue-100 transition-all flex items-center justify-center gap-2">
                        <i data-lucide="plus-circle" class="w-4 h-4"></i> Ajouter une étape
                    </button>
                </div>
            </aside>

            <!-- Carte -->
            <main class="map-container flex-1 relative">
                <div id="map"></div>
                
                <!-- PANNEAU VISIONNAGE -->
                <div id="viewer-panel" class="hidden absolute top-4 right-4 w-full md:w-[440px] bg-white rounded-[32px] shadow-2xl z-[1000] overflow-hidden flex flex-col border border-slate-200 animate-slide-up">
                    <div class="relative h-64 shrink-0">
                        <img id="view-img" src="" class="w-full h-full object-cover" alt="Vue de Hambourg">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent"></div>
                        <button onclick="closeViewer()" class="absolute top-5 right-5 p-2.5 bg-black/30 backdrop-blur-md text-white rounded-full hover:bg-black/50 transition-all">
                            <i data-lucide="x"></i>
                        </button>
                        <div class="absolute bottom-6 left-8 right-8 text-white">
                            <div class="flex items-center gap-2 mb-2">
                                <span id="view-time" class="bg-blue-600 text-[10px] px-2.5 py-1 rounded-lg font-black uppercase"></span>
                                <span id="view-dur" class="bg-white/20 backdrop-blur-md text-[10px] px-2.5 py-1 rounded-lg font-black uppercase"></span>
                            </div>
                            <h2 id="view-title" class="text-2xl font-black leading-tight tracking-tight"></h2>
                        </div>
                    </div>
                    <div class="p-8 overflow-y-auto no-scrollbar" style="max-height: 50vh;">
                        <div class="space-y-6">
                            <div class="space-y-3">
                                <h4 class="text-[10px] font-black text-blue-600 uppercase tracking-widest flex items-center gap-2">
                                    <i data-lucide="sparkles" class="w-4 h-4"></i> Au programme
                                </h4>
                                <p id="view-desc" class="text-slate-800 text-base leading-relaxed font-semibold"></p>
                            </div>
                            <div class="bg-slate-50 p-5 rounded-3xl border border-slate-100">
                                <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2 mb-3">
                                    <i data-lucide="history" class="w-4 h-4"></i> Note historique
                                </h4>
                                <p id="view-hist" class="text-slate-600 text-sm leading-relaxed italic"></p>
                            </div>
                            <div class="flex flex-col gap-3 pt-4">
                                <button id="view-map-link" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-blue-100 flex items-center justify-center gap-3 active:scale-95 transition-all">
                                    <i data-lucide="navigation" class="w-5 h-5"></i> Itinéraire Google Maps
                                </button>
                                <a id="view-wiki" href="#" target="_blank" class="w-full bg-slate-100 text-slate-700 py-3.5 rounded-2xl font-black text-[11px] uppercase tracking-widest text-center hover:bg-slate-200 transition-all flex items-center justify-center gap-2">
                                    <i data-lucide="info" class="w-4 h-4"></i> En savoir plus
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- PANNEAU ÉDITION -->
                <div id="edit-panel" class="hidden absolute top-4 right-4 w-full md:w-[400px] bg-white rounded-[32px] shadow-2xl z-[1000] overflow-hidden flex flex-col border-2 border-blue-500 animate-slide-up">
                    <div class="p-6 border-b bg-blue-50 flex justify-between items-center">
                        <h2 class="font-black text-blue-900 uppercase text-xs tracking-widest">Configuration</h2>
                        <button onclick="closeEdit()" class="text-blue-400 hover:text-blue-600"><i data-lucide="circle-dashed"></i></button>
                    </div>
                    <div class="p-6 space-y-5 overflow-y-auto no-scrollbar" style="max-height: 70vh;">
                        <form id="edit-form" class="space-y-4">
                            <input type="hidden" id="e-id">
                            <div>
                                <label class="text-[9px] font-black uppercase text-slate-400 mb-1 block">Nom</label>
                                <input type="text" id="e-name" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-3 font-bold text-sm outline-none focus:border-blue-500 transition-all">
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="text-[9px] font-black uppercase text-slate-400 mb-1 block">Heure</label>
                                    <input type="text" id="e-time" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-3 font-bold text-sm outline-none">
                                </div>
                                <div>
                                    <label class="text-[9px] font-black uppercase text-slate-400 mb-1 block">Durée</label>
                                    <input type="text" id="e-dur" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-3 font-bold text-sm outline-none">
                                </div>
                            </div>
                            <div>
                                <label class="text-[9px] font-black uppercase text-slate-400 mb-1 block">Description</label>
                                <textarea id="e-desc" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-3 font-bold text-sm outline-none" rows="3"></textarea>
                            </div>
                            <div class="flex gap-3 pt-4">
                                <button type="button" onclick="deleteStep()" class="p-4 bg-red-50 text-red-500 rounded-2xl hover:bg-red-100 transition-all"><i data-lucide="trash-2"></i></button>
                                <button type="submit" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-blue-700 shadow-lg shadow-blue-100 transition-all">Enregistrer</button>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        let isEditMode = false;
        const DEFAULT_IMG = "https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?w=800";

        let ITINERARY = [
            { id: 1, name: "Départ : Hôtel (Hbf)", coords: [53.5452637, 9.980133], time: "09:00", dur: "15m", desc: "Début de la journée à l'hôtel où on loge.", hist: "Un hôtel quoi", wiki: "https://fr.wikipedia.org/wiki/Gare_centrale_de_Hambourg", img: "https://images.unsplash.com/photo-1549413216-5633390c529e?w=800" },
            { id: 2, name: "Alsterfontäne", coords: [53.5532, 9.9925], time: "09:30", dur: "30m", desc: "Le jet d'eau iconique sur le lac Binnenalster.", hist: "La fontaine propulse l'eau à 60 mètres de hauteur.", wiki: "https://de.wikipedia.org/wiki/Alsterfont%C3%A4ne", img: "https://images.unsplash.com/photo-1513135557534-682d53fd7046?w=800" },
            { id: 3, name: "Alsterarkaden & Rathaus", coords: [53.5505, 9.9935], time: "10:15", dur: "45m", desc: "Arcades vénitiennes et le somptueux Hôtel de Ville.", hist: "Le Rathaus possède 647 pièces, soit plus que Buckingham Palace.", wiki: "https://fr.wikipedia.org/wiki/H%C3%B4tel_de_ville_de_Hambourg", img: "https://images.unsplash.com/photo-1582046808794-d45a90977232?w=800" },
            { id: 4, name: "Speicherstadt", coords: [53.5432, 9.9915], time: "11:15", dur: "45m", desc: "Le quartier historique des entrepôts sur pilotis.", hist: "Inscrit à l'UNESCO, c'est le plus grand quartier d'entrepôts au monde.", wiki: "https://fr.wikipedia.org/wiki/Speicherstadt", img: "https://images.unsplash.com/photo-1563294371-33230d473215?w=800" },
            { id: 5, name: "Déjeuner : Oberhafen-Kantine", coords: [53.5435, 10.0075], time: "12:15", dur: "1h30", desc: "Le fameux restaurant penché à l'entrée du port.", hist: "Un monument historique qui a résisté à de nombreuses crues.", wiki: "https://www.oberhafenkantine-hamburg.de/", img: "https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=800" },
            { id: 6, name: "Elbphilharmonie Plaza", coords: [53.5413, 9.9841], time: "14:00", dur: "45m", desc: "Vue panoramique sur le port depuis la plateforme.", hist: "L'un des bâtiments les plus chers au monde, achevé en 2016.", wiki: "https://fr.wikipedia.org/wiki/Philharmonie_de_l%27Elbe", img: "https://images.unsplash.com/photo-1516601445129-376c66c07a55?w=800" },
            { id: 7, name: "Feuerschiff & Cap San Diego", coords: [53.5435, 9.9775], time: "15:00", dur: "30m", desc: "Le bateau-phare rouge et le cargo blanc historique.", hist: "Le Cap San Diego est le plus grand navire de fret civil musée au monde.", wiki: "https://de.wikipedia.org/wiki/Feuerschiff_LV_13", img: "https://images.unsplash.com/photo-1545667345-48473a2167c1?w=800" },
            { id: 8, name: "Vieux Tunnel sous l'Elbe", coords: [53.5459, 9.9665], time: "15:45", dur: "1h", desc: "Traversée piétonne sous le fleuve (426m).", hist: "Une merveille d'ingénierie de 1911 avec des ascenseurs géants.", wiki: "https://fr.wikipedia.org/wiki/Vieux_tunnel_sous_l%27Elbe", img: "https://images.unsplash.com/photo-1589330694653-9993307779a1?w=800" },
            { id: 9, name: "Rive Sud (Steinwerder)", coords: [53.5410, 9.9660], time: "16:45", dur: "30m", desc: "La vue la plus célèbre de Hambourg de l'autre côté.", hist: "Le point de vue idéal pour photographier la skyline.", wiki: "#", img: "https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?w=800" },
            { id: 10, name: "Monument Bismarck & Parc", coords: [53.5475, 9.9715], time: "17:30", dur: "45m", desc: "Traversée de l'Alter Elbpark vers le colosse.", hist: "Une statue géante de 34m entourée de catacombes.", wiki: "https://fr.wikipedia.org/wiki/Monument_de_Bismarck_(Hambourg)", img: "https://images.unsplash.com/photo-1623953554160-f65f04a601be?w=800" },
            { id: 11, name: "HAMBURG BUNKER (St. Pauli)", coords: [53.5562, 9.9695], time: "18:30", dur: "1h", desc: "Toit terrasse gratuit, jardin suspendu et exposition.", hist: "Un ancien bunker de défense aérienne transformé en oasis urbaine. L'accès au toit est gratuit !", wiki: "https://hamburg-bunker.de/", img: "https://images.unsplash.com/photo-1621370966956-f4f039ec7245?w=800" },
            { id: 12, name: "Beatles-Platz", coords: [53.5492, 9.9575], time: "19:45", dur: "30m", desc: "La place en forme de disque vinyle dédiée aux Beatles.", hist: "Les Beatles ont fait leurs débuts dans les clubs de ce quartier.", wiki: "https://fr.wikipedia.org/wiki/Beatles-Platz", img: "https://images.unsplash.com/photo-1614032333069-7c80074212ec?w=800" },
            { id: 13, name: "Retour via les quartiers animés", coords: [53.549461265641334, 9.962230274147952], time: "20:00", dur: "15m", desc: "Les quartiers animés de St. Pauli et Reeperbahn ", hist: "Reeperbahn, réputée pour son ambiance festive et son histoire musicale. ", wiki: "#", img: "https://images.unsplash.com/photo-1549413216-5633390c529e?w=800" },
            { id: 14, name: "Fin de boucle : Hôtel", coords: [53.5452637, 9.980133], time: "20:30", dur: "15m", desc: "Retour à l'hôtel avant la soirée spectacle.", hist: "Point final de l'itinéraire principal.", wiki: "#", img: "https://images.unsplash.com/photo-1549413216-5633390c529e?w=800" },
            { id: 15, name: "SOIR : Planten un Blomen", coords: [53.5605, 9.9835], time: "21:30", dur: "1h", desc: "Spectacle à 22h : Fontaines, lumières et musique.", hist: "Les 'Wasserlichtkonzerte' sont gratuits et magiques.", wiki: "https://de.wikipedia.org/wiki/Planten_un_Blomen", img: "https://images.unsplash.com/photo-1517582082532-16a090954930?w=800" }
        ];

        let map, markers = [], polyline;

        function init() {
            lucide.createIcons();
            // Source Voyager de CartoDB (très stable)
            map = L.map('map', { zoomControl: false }).setView([53.548, 9.985], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap contributors © CartoDB'
            }).addTo(map);
            render();
            document.getElementById('edit-form').onsubmit = (e) => { e.preventDefault(); saveChanges(); };
        }

        function toggleAppMode() {
            isEditMode = !isEditMode;
            const btn = document.getElementById('toggle-edit-btn');
            const indicator = document.getElementById('mode-indicator');
            const addContainer = document.getElementById('add-step-container');
            if (isEditMode) {
                btn.innerHTML = '<i data-lucide="eye" class="w-4 h-4"></i> Mode Visionnage';
                btn.classList.replace('bg-slate-900', 'bg-blue-600');
                indicator.innerText = "Mode Édition";
                addContainer.classList.remove('hidden');
                closeViewer();
            } else {
                btn.innerHTML = '<i data-lucide="settings-2" class="w-4 h-4"></i> Gérer l\'itinéraire';
                btn.classList.replace('bg-blue-600', 'bg-slate-900');
                indicator.innerText = "Mode Visionnage";
                addContainer.classList.add('hidden');
                closeEdit();
            }
            render();
            lucide.createIcons();
        }

        function render() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            if (polyline) map.removeLayer(polyline);
            const list = document.getElementById('itinerary-list');
            list.innerHTML = "";
            const routeCoords = ITINERARY.map(p => p.coords);
            polyline = L.polyline(routeCoords, { color: '#2563eb', weight: 4, opacity: 0.6 }).addTo(map);
            
            ITINERARY.forEach((place, index) => {
                const item = document.createElement('div');
                item.className = `p-4 rounded-2xl border ${isEditMode ? 'border-dashed border-slate-200' : 'border-slate-100'} bg-white cursor-pointer hover:shadow-md transition-all flex items-center gap-4`;
                item.onclick = () => isEditMode ? openEdit(place) : openViewer(place);
                
                let controls = `<div class="w-8 h-8 rounded-xl bg-blue-100 text-blue-600 flex items-center justify-center font-black text-[11px]">${index + 1}</div>`;
                if (isEditMode) {
                    controls = `
                        <div class="flex flex-col gap-0.5 items-center">
                            <button onclick="moveStep(event, ${index}, -1)" class="p-0.5 text-slate-300 hover:text-blue-600"><i data-lucide="chevron-up" class="w-4 h-4"></i></button>
                            <div class="w-7 h-7 rounded-lg bg-blue-600 text-white flex items-center justify-center font-black text-[10px]">${index + 1}</div>
                            <button onclick="moveStep(event, ${index}, 1)" class="p-0.5 text-slate-300 hover:text-blue-600"><i data-lucide="chevron-down" class="w-4 h-4"></i></button>
                        </div>
                    `;
                }
                
                item.innerHTML = `${controls}<div class="flex-1"><div class="flex justify-between items-start"><h3 class="font-bold text-slate-800 text-[13px] leading-tight">${place.name}</h3><span class="text-[9px] font-black text-blue-600">${place.time}</span></div><p class="text-[10px] text-slate-400 mt-1 line-clamp-1">${place.desc}</p></div>`;
                list.appendChild(item);
                
                const icon = L.divIcon({ className: '', html: `<div class="custom-pin ${isEditMode ? 'opacity-50' : ''}"><div>${index + 1}</div></div>`, iconSize: [32, 32], iconAnchor: [16, 32] });
                const m = L.marker(place.coords, { icon }).addTo(map).on('click', () => isEditMode ? openEdit(place) : openViewer(place));
                markers.push(m);
            });
            document.getElementById('step-count').innerText = ITINERARY.length + " étapes";
            lucide.createIcons();
        }

        function openViewer(place) {
            closeEdit();
            const panel = document.getElementById('viewer-panel');
            panel.classList.remove('hidden');
            document.getElementById('view-img').src = place.img;
            document.getElementById('view-title').innerText = place.name;
            document.getElementById('view-time').innerText = place.time;
            document.getElementById('view-dur').innerText = "Prévu : " + place.dur;
            document.getElementById('view-desc').innerText = place.desc;
            document.getElementById('view-hist').innerText = place.hist;
            document.getElementById('view-wiki').href = place.wiki;
            document.getElementById('view-map-link').onclick = () => { window.open(`https://www.google.com/maps/dir/?api=1&destination=${place.coords[0]},${place.coords[1]}&travelmode=walking`); };
            map.flyTo(place.coords, 16);
            lucide.createIcons();
        }

        function openEdit(place) {
            closeViewer();
            const panel = document.getElementById('edit-panel');
            panel.classList.remove('hidden');
            document.getElementById('e-id').value = place.id;
            document.getElementById('e-name').value = place.name;
            document.getElementById('e-time').value = place.time;
            document.getElementById('e-dur').value = place.dur;
            document.getElementById('e-desc').value = place.desc;
            map.flyTo(place.coords, 16);
            lucide.createIcons();
        }

        function saveChanges() {
            const id = parseInt(document.getElementById('e-id').value);
            const index = ITINERARY.findIndex(p => p.id === id);
            ITINERARY[index] = { ...ITINERARY[index], name: document.getElementById('e-name').value, time: document.getElementById('e-time').value, dur: document.getElementById('e-dur').value, desc: document.getElementById('e-desc').value };
            render();
            closeEdit();
        }

        function moveStep(event, index, direction) {
            event.stopPropagation();
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= ITINERARY.length) return;
            const temp = ITINERARY[index]; ITINERARY[index] = ITINERARY[newIndex]; ITINERARY[newIndex] = temp;
            render();
        }

        function createNewStep() {
            const newId = Date.now();
            const center = map.getCenter();
            ITINERARY.push({ id: newId, name: "Nouveau Lieu", coords: [center.lat, center.lng], time: "00:00", dur: "15m", desc: "...", hist: "...", wiki: "#", img: DEFAULT_IMG });
            render();
            openEdit(ITINERARY[ITINERARY.length - 1]);
        }

        function deleteStep() {
            const id = parseInt(document.getElementById('e-id').value);
            ITINERARY = ITINERARY.filter(p => p.id !== id);
            render();
            closeEdit();
        }

        function closeViewer() { document.getElementById('viewer-panel').classList.add('hidden'); }
        function closeEdit() { document.getElementById('edit-panel').classList.add('hidden'); }
        window.onload = init;
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Service Worker enregistré avec succès !', reg))
        .catch(err => console.warn('Erreur d\'enregistrement du Service Worker', err));
    });
  }
</script>

</body>
</html>
